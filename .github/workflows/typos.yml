name: Check for typos

on:
    push: 
      branches: [ "main" ]
    pull_request: 
      branches: [ "main" ]

jobs:
  typos-check: 
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository 
          uses: actions/checkout@v6.0.2
        - name: Run typos checker 
          uses: crate-ci/typos@master
